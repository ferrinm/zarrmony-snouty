name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install zarrmony-snouty and dev tools
        run: uv pip install -e ".[dev]"

      - name: Lint
        run: .venv/bin/ruff check

      - name: Format check
        run: .venv/bin/ruff format --check

      - name: Test
        run: .venv/bin/pytest
